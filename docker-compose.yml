version: '3.8'

services:
  pms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /path/to/media:/media:ro
      - /path/to/media/.metadata:/media/.metadata:rw
    environment:
      - PMS_PATH=/media
      - PMS_PORT=8080
      - PMS_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
